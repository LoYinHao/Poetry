<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>張天春詩文彙編</title>
    <!-- Google Fonts: Noto Serif TC for elegant traditional Chinese style -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="hero">
        <div class="hero-content">
            <h1 class="site-title">張天春詩文彙編</h1>
            <p class="site-subtitle">清風明月本無價，近水遠山皆有情</p>
        </div>
        <div class="seal">天春</div>
    </header>

    <main class="container">
        <!-- Author Profile -->
        <section class="author-profile">
            <div class="author-image-container">
                <img src="Image/logo.png" alt="張天春" class="author-image">
            </div>
            <div class="author-bio">
                <h2>關於詩人：張天春</h2>
                <p>古典詩人，畢生浸淫於國學與詩詞創作。其作品風格高雅，意境深遠，常以自然山水、生活感悟入詩，傳承傳統詩詞之美。本網站彙編其畢生詩文精華，以饗同好。</p>
            </div>
        </section>

        <!-- Filters (if needed in the future) -->
        <section class="filters">
            <h2>詩文賞析</h2>
            <div id="category-tabs" class="tabs">
                <!-- Tabs will be dynamically generated -->
            </div>
        </section>

        <!-- Poems Grid -->
        <section id="poems-grid" class="grid">
            <!-- Cards will be dynamically inserted here by script.js -->
        </section>

        <!-- Pagination -->
        <div id="pagination" class="pagination">
            <!-- Pagination buttons will be dynamically inserted here -->
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 張天春詩文彙編 - 中國風古典雅緻展示版</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
